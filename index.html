<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="0; url=http://127.0.0.1:3000/" />
    <title>Jamal Mohammad Portfolio</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #050505 0%, #111 100%);
        color: #f5d06b;
        font-family: Inter, Arial, sans-serif;
      }
      .card {
        text-align: center;
        padding: 2rem 2.5rem;
        border: 1px solid rgba(245, 208, 107, 0.25);
        border-radius: 1.25rem;
        background: rgba(0, 0, 0, 0.7);
        box-shadow: 0 0 40px rgba(200, 155, 60, 0.18);
      }
      a { color: #f5d06b; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Jamal Mohammad</h1>
      <p>Opening the full portfolio website…</p>
      <p><a href="http://127.0.0.1:3000/">Open the site now</a></p>
    </div>
  </body>
</html>
